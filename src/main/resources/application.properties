spring.application.name=sarvasya-lms-backend

# Virtual threads (requires Java 21+)
spring.threads.virtual.enabled=true

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sarvasyalms}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.pool-name=${DB_POOL_NAME:sarvasya-hikari}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:80}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:20}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME_MS:240000}
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=${JPA_BATCH_SIZE:50}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.default_batch_fetch_size=${JPA_DEFAULT_BATCH_FETCH_SIZE:100}
spring.jpa.properties.hibernate.jdbc.fetch_size=${JPA_FETCH_SIZE:100}
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.generate_statistics=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Tenant Limits have been moved to tenant-specific schema. Managed via database.
 
# Multipart Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:sarvasya.edu.tech@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Security Configuration
signup.key=${SIGNUP_KEY}

# Multi-Tenancy Configuration
spring.jpa.open-in-view=false

# CORS (comma-separated)
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Rate limiting
security.rate-limit.auth.requests-per-minute=${AUTH_RATE_LIMIT_RPM:20}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=tenant
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.connect-retries=${FLYWAY_CONNECT_RETRIES:10}
spring.flyway.connect-retries-interval=5s
spring.flyway.lock-retry-count=${FLYWAY_LOCK_RETRY_COUNT:100}

# Multi-tenant safety: avoid Flyway migrations on request threads under load.
app.tenancy.auto-migrate-on-request=${TENANCY_AUTO_MIGRATE_ON_REQUEST:false}

# Sharding + read replicas (optional; default disabled)
# - Enable and define shards when you add more DBs/replicas.
app.db.sharding.enabled=${DB_SHARDING_ENABLED:false}
